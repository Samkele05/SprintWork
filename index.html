<!DOCTYPE html>
<html lang="en">
<head>

    <title>Gawean Job Matching UI</title>
    <link rel="stylesheet" href="styles/light-theme.css" id="theme-link">
    <link rel="stylesheet" href="styles/dark-theme.css" id="dark-theme" disabled>
    <script src="scripts/theme-toggle.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#auth">Login/Register</a></li>

                <li><a href="#jobs">Job Listings</a></li>
                <li><a href="#messages">Messages</a></li>
                <li><a href="#profile">Profile Management</a></li>
                <li><button id="theme-toggle">Toggle Dark/Light Mode</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="auth">
            <h2>Authentication</h2>

                <!-- Login/Register Forms -->
            </form>

            </div>
        </section>

        <section id="jobs">
            <h2>Job Listings</h2>
            <div class="job-listings">
                <!-- Job listings content -->
            </div>
        </section>

        <section id="messages">
            <h2>Messages</h2>
            <div class="message-content">
                <!-- Messaging contents -->
            </div>
        </section>

        <section id="profile">
            <h2>Profile Management</h2>
            <div class="profile-content">
                <!-- Profile management content -->
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Gawean Job Matching Service</p>
